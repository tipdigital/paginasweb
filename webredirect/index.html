    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --base: #050508;
            --surface: #0d0d14;
            --neon-blue: #00CFFF;
            --neon-purple: #7B2CBF;
        }

        html, body {
            min-height: 100%;
            background-color: var(--base);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Fundo animado sutil */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 40%, rgba(123,44,191,0.12) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 80% 60%, rgba(0,207,255,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2.5rem 2rem;
            max-width: 420px;
            width: 90%;
            background: rgba(13, 13, 20, 0.7);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 1.5rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 0 60px rgba(123,44,191,0.1), 0 0 30px rgba(0,207,255,0.05);
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Ícone de WhatsApp animado */
        .wa-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, #25D366, #128C7E);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s ease infinite;
            box-shadow: 0 0 0 0 rgba(37,211,102,0.4);
        }

        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(37,211,102,0.4); }
            70%  { box-shadow: 0 0 0 14px rgba(37,211,102,0); }
            100% { box-shadow: 0 0 0 0 rgba(37,211,102,0); }
        }

        .wa-icon svg {
            width: 34px;
            height: 34px;
            fill: #ffffff;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.6rem;
            line-height: 1.3;
        }

        .subtitle {
            font-size: 0.875rem;
            color: rgba(255,255,255,0.55);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* Botão principal */
        .btn-wrapper {
            position: relative;
            border-radius: 9999px;
            z-index: 1;
            display: inline-block;
            width: 100%;
        }
        .btn-wrapper::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, #00CFFF, #7B2CBF, #00CFFF);
            background-size: 200% 200%;
            z-index: -1;
            border-radius: 9999px;
            animation: moveGrad 3s ease infinite;
        }
        @keyframes moveGrad {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .btn-inner {
            display: block;
            background: #0d0d14;
            border-radius: 9999px;
            padding: 1rem 2rem;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #ffffff;
            text-decoration: none;
            transition: background 0.3s;
        }
        .btn-inner:hover { background: #13131e; }

        .divider {
            margin: 1.5rem 0 1rem;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.25);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* Barra de loading sutil */
        .loading-bar {
            height: 2px;
            background: rgba(255,255,255,0.06);
            border-radius: 9999px;
            overflow: hidden;
            margin-top: 2rem;
        }
        .loading-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue));
            border-radius: 9999px;
            animation: loadFill 1.5s ease forwards;
        }
        @keyframes loadFill {
            to { width: 100%; }
        }
