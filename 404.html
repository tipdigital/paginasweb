<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/style.css">
  <title>Página não Encontrada - TipDigital</title>
</head>
<body>
  <style>
    .error-container {
      max-width: 600px;
      margin: 150px auto;
      text-align: center;
      padding: 0 20px;
    }

    .error-code {
      font-size: 6rem;
      font-weight: 800;
      font-family: 'Outfit', sans-serif;
      margin-bottom: 1rem;
      color: rgba(255, 255, 255, 0.05);
      position: relative;
    }

    .error-code::after {
      content: '404';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      color: var(--accent-color);
      letter-spacing: 5px;
      text-shadow: 0 0 20px var(--accent-glow);
    }
  </style>

  <main class="error-container">
    <div class="error-code">404</div>
    <h1 style="margin-bottom: 1rem;">Opa, caminho sem saída... 🚧</h1>
    <p style="color: var(--text-secondary); margin-bottom: 3rem;">A página que você está procurando pode ter sido movida ou não existe mais.</p>
    
    <a href="./" class="btn-primary">⬅️ Voltar ao Início</a>
  </main>
</body>
</html>
