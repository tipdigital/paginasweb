  <style>
    .vsl-container {
      max-width: 960px;
      margin: 80px auto;
      padding: 0 20px;
      text-align: center;
    }

    .vsl-headline {
      font-size: 2.8rem;
      margin-bottom: 2rem;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
      background: #000;
      border-radius: 20px;
      box-shadow: 0 0 50px rgba(112, 0, 255, 0.3);
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.05);
      margin-bottom: 3rem;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .placeholder-player {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 4rem;
      cursor: pointer;
      color: var(--accent-color);
      transition: var(--transition);
    }

    .placeholder-player:hover {
      transform: translate(-50%, -50%) scale(1.1);
      filter: drop-shadow(0 0 15px var(--accent-glow));
    }

    /* Buttons underneath VSL */
    .cta-area {
      margin-top: 2rem;
      /* hidden by default if delaying */
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
  </style>

  <main class="vsl-container">
    <div style="font-size: 1.2rem; margin-bottom: 1rem; color: var(--accent-color); font-weight: 600; text-transform: uppercase;">Diagnóstico Exclusivo</div>
    <h1 class="vsl-headline glow-text">Aperte o Player Abaixo para Descobrir o <span class="glow-accent">Motor de Escala</span> Oculto</h1>

    <div class="video-wrapper">
      <!-- Aqui entra o Iframe do Vimeo/Youtube/Panda -->
      <div class="placeholder-player">▶️</div>
      <div style="position: absolute; bottom: 20px; right: 20px; font-size: 0.8rem; color: rgba(255,255,255,0.4)">Exemplo de Frame</div>
    </div>

    <div class="cta-area">
      <a href="../obrigado/" class="btn-accent" style="font-size: 1.5rem; letter-spacing: 0px;">Agendar Diagnóstico Gratuito 🗓️</a>
      <p style="font-size: 0.85rem; color: var(--text-secondary); max-width: 400px; margin: 0 auto; line-height: 1.4;">
        Sem compromissos. Se sua operação faturava menos de 10k, não agende ainda.
      </p>
    </div>
  </main>
